<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Your Astrological Status</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000;
            --text-color: #fff;
            --border-color: #fff;
            --accent-color: #aaaaaa;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        /* Retro RPG Box */
        .rpg-box {
            border: 4px solid var(--border-color);
            background: #000;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 4px 4px 0px var(--accent-color);
            position: relative;
        }
        
        .rpg-title {
            text-align: center;
            font-size: 1.5em;
            text-transform: uppercase;
            border-bottom: 2px dashed var(--border-color);
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .loading {
            text-align: center;
            font-size: 1.2em;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        .content {
            white-space: pre-wrap; /* to preserve newlines from AI */
            line-height: 1.6;
            font-size: 1.1em;
        }

        .btn {
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 10px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1em;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 2px 2px 0px var(--accent-color);
            transition: all 0.1s;
            margin: 5px;
            width: 100%;
        }
        .btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }
        .btn:active {
            box-shadow: 0px 0px 0px var(--accent-color);
            transform: translate(2px, 2px);
        }

        .hidden {
            display: none !important;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        .chat-result {
            margin-top: 15px;
            border-left: 4px solid var(--border-color);
            padding-left: 15px;
            font-style: italic;
            color: #ddd;
            background: #111;
            padding: 10px;
            margin-bottom: 10px;
        }
        
        #waitlistBtn {
            border-color: #ffcc00;
            color: #ffcc00;
        }
        #waitlistBtn:hover {
            background: #ffcc00;
            color: #000;
        }
    </style>
</head>
<body>

<div class="rpg-box" id="profileBox">
    <h1 class="rpg-title">CHARACTER STATUS</h1>
    <div id="loadingScreen" class="loading">ANALYZING STARS...</div>
    <div id="profileContent" class="content hidden"></div>
</div>

<div class="actions hidden" id="actionContainer">
    <button id="askAiBtn" class="btn">ลองถาม AI ครั้งแรก</button>
    <div id="askAiResult" class="chat-result hidden"></div>
    <button id="waitlistBtn" class="btn hidden" onclick="window.location.href='#'">เข้าร่วม Waitlist</button>
</div>

<script>
    const API_URL = 'https://muniel-alpha.vercel.app/api/ask';

    // Parse URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const getParamsString = () => {
        let params = [];
        for (const [key, value] of urlParams.entries()) {
            params.push(`${key}: ${value}`);
        }
        return params.join(', ');
    };

    const generateProfile = async () => {
        const userData = getParamsString() || "Unknown";
        const prompt = `Based on Western astrology for the following user details (${userData}), generate a short RPG Character Status profile. 
        Format as plain text with clear headings:
        [CLASS] (based on zodiac/traits)
        [ELEMENT]
        [STRENGTHS]
        [WEAKNESSES]
        [PERSONALITY]
        Keep it concise, similar to MBTI, but astrological. Write in Thai language. Use an RPG game tone.`;

        try {
            const resp = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: prompt })
            });
            const data = await resp.json();
            
            document.getElementById('loadingScreen').classList.add('hidden');
            const profileContent = document.getElementById('profileContent');
            
            if (data.error) {
                profileContent.textContent = "SYSTEM ERROR: " + data.error;
            } else {
                profileContent.textContent = data.answer;
                document.getElementById('actionContainer').classList.remove('hidden');
            }
            profileContent.classList.remove('hidden');

        } catch (e) {
            document.getElementById('loadingScreen').classList.add('hidden');
            const profileContent = document.getElementById('profileContent');
            profileContent.textContent = "CONNECTION FAILED. THE STARS ARE UNREACHABLE.";
            profileContent.classList.remove('hidden');
            console.error(e);
        }
    };

    // Ask AI Button logic
    document.getElementById('askAiBtn').addEventListener('click', async () => {
        const question = prompt("ถามคำถามเกี่ยวกับดวงชะตาหรือคำแนะนำส่วนตัวของคุณ (ตัวอย่าง: วันนี้ฉันควรโฟกัสเรื่องอะไร?)");
        if (!question) return;
        
        const btn = document.getElementById('askAiBtn');
        const resultDiv = document.getElementById('askAiResult');
        const waitlistBtn = document.getElementById('waitlistBtn');

        btn.disabled = true;
        btn.textContent = 'SYSTEM PROCESSING...';
        
        try {
            const context = document.getElementById('profileContent').textContent;
            // Provide some context so AI knows it's the same user
            const aiPrompt = `นี่คือโปรไฟล์โหราศาสตร์ของฉัน:\n${context}\n\nคำถามของฉันคือ: ${question}\nช่วยตอบคำถามนี้แบบสั้นกระชับ เป็นภาษาไทย และรักษาโทนความเป็นผู้ให้คำปรึกษาทางโหราศาสตร์ไว้`;

            const resp = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: aiPrompt })
            });
            const data = await resp.json();

            if (data.error) {
                alert('ERROR: ' + data.error);
            } else {
                resultDiv.textContent = `คำตอบ: ${data.answer}`;
                resultDiv.classList.remove('hidden');
                // Show waitlist button
                waitlistBtn.classList.remove('hidden');
            }
        } catch (e) {
            alert('CONNECTION FAILED.');
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.textContent = 'ลองถาม AI อีกครั้ง';
        }
    });

    // Start profile generation on load
    window.onload = generateProfile;
</script>
</body>
</html>
