<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Your Astrological Status</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000;
            --text-color: #fff;
            --border-color: #fff;
            --accent-color: #aaaaaa;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        /* Retro RPG Box */
        .rpg-box {
            border: 4px solid var(--border-color);
            background: #000;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 4px 4px 0px var(--accent-color);
            position: relative;
        }
        
        .rpg-title {
            text-align: center;
            font-size: 1.5em;
            text-transform: uppercase;
            border-bottom: 2px dashed var(--border-color);
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .loading {
            text-align: center;
            font-size: 1.2em;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        .content {
            white-space: pre-wrap; /* to preserve newlines from AI */
            line-height: 1.6;
            font-size: 1.1em;
        }

        .btn {
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 10px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1em;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 2px 2px 0px var(--accent-color);
            transition: all 0.1s;
            margin: 5px;
            width: 100%;
        }
        .btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }
        .btn:active {
            box-shadow: 0px 0px 0px var(--accent-color);
            transform: translate(2px, 2px);
        }

        .hidden {
            display: none !important;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        .chat-result {
            margin-top: 15px;
            border-left: 4px solid var(--border-color);
            padding-left: 15px;
            font-style: italic;
            color: #ddd;
            background: #111;
            padding: 10px;
            margin-bottom: 10px;
        }
        
        #waitlistBtn {
            border-color: #ffcc00;
            color: #ffcc00;
        }
        #waitlistBtn:hover {
            background: #ffcc00;
            color: #000;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
        }
        .rpg-input {
            background: #000;
            color: #fff;
            border: 2px solid var(--border-color);
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1em;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .rpg-input:focus {
            border-color: #ffcc00;
        }
        select.rpg-input {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="rpg-box" id="profileBox">
    <h1 class="rpg-title">CHARACTER STATUS</h1>
    
    <div id="inputForm">
        <div class="form-group">
            <label for="dob">วันเกิด (Date of Birth)</label>
            <input type="date" id="dob" class="rpg-input">
        </div>
        <div class="form-group">
            <label for="tob">เวลาเกิดโดยประมาณ (Estimated Time)</label>
            <select id="tob" class="rpg-input">
                <option value="">-- เลือกเวลา --</option>
                <option value="00:00 - 02:00">00:00 - 02:00</option>
                <option value="02:00 - 04:00">02:00 - 04:00</option>
                <option value="04:00 - 06:00">04:00 - 06:00</option>
                <option value="06:00 - 08:00">06:00 - 08:00</option>
                <option value="08:00 - 10:00">08:00 - 10:00</option>
                <option value="10:00 - 12:00">10:00 - 12:00</option>
                <option value="12:00 - 14:00">12:00 - 14:00</option>
                <option value="14:00 - 16:00">14:00 - 16:00</option>
                <option value="16:00 - 18:00">16:00 - 18:00</option>
                <option value="18:00 - 20:00">18:00 - 20:00</option>
                <option value="20:00 - 22:00">20:00 - 22:00</option>
                <option value="22:00 - 24:00">22:00 - 24:00</option>
                <option value="ไม่ทราบเวลาเกิด">ไม่ทราบเวลาเกิด</option>
            </select>
        </div>
        <div class="form-group">
            <label for="province">จังหวัดเกิด (Province)</label>
            <select id="province" class="rpg-input">
                <option value="">-- เลือกจังหวัด --</option>
                <option value="กรุงเทพมหานคร">กรุงเทพมหานคร</option><option value="กระบี่">กระบี่</option><option value="กาญจนบุรี">กาญจนบุรี</option><option value="กาฬสินธุ์">กาฬสินธุ์</option><option value="กำแพงเพชร">กำแพงเพชร</option><option value="ขอนแก่น">ขอนแก่น</option><option value="จันทบุรี">จันทบุรี</option><option value="ฉะเชิงเทรา">ฉะเชิงเทรา</option><option value="ชลบุรี">ชลบุรี</option><option value="ชัยนาท">ชัยนาท</option><option value="ชัยภูมิ">ชัยภูมิ</option><option value="ชุมพร">ชุมพร</option><option value="เชียงราย">เชียงราย</option><option value="เชียงใหม่">เชียงใหม่</option><option value="ตรัง">ตรัง</option><option value="ตราด">ตราด</option><option value="ตาก">ตาก</option><option value="นครนายก">นครนายก</option><option value="นครปฐม">นครปฐม</option><option value="นครพนม">นครพนม</option><option value="นครราชสีมา">นครราชสีมา</option><option value="นครศรีธรรมราช">นครศรีธรรมราช</option><option value="นครสวรรค์">นครสวรรค์</option><option value="นนทบุรี">นนทบุรี</option><option value="นราธิวาส">นราธิวาส</option><option value="น่าน">น่าน</option><option value="บึงกาฬ">บึงกาฬ</option><option value="บุรีรัมย์">บุรีรัมย์</option><option value="ปทุมธานี">ปทุมธานี</option><option value="ประจวบคีรีขันธ์">ประจวบคีรีขันธ์</option><option value="ปราจีนบุรี">ปราจีนบุรี</option><option value="ปัตตานี">ปัตตานี</option><option value="พระนครศรีอยุธยา">พระนครศรีอยุธยา</option><option value="พังงา">พังงา</option><option value="พัทลุง">พัทลุง</option><option value="พิจิตร">พิจิตร</option><option value="พิษณุโลก">พิษณุโลก</option><option value="เพชรบุรี">เพชรบุรี</option><option value="เพชรบูรณ์">เพชรบูรณ์</option><option value="แพร่">แพร่</option><option value="พะเยา">พะเยา</option><option value="ภูเก็ต">ภูเก็ต</option><option value="มหาสารคาม">มหาสารคาม</option><option value="มุกดาหาร">มุกดาหาร</option><option value="แม่ฮ่องสอน">แม่ฮ่องสอน</option><option value="ยะลา">ยะลา</option><option value="ยโสธร">ยโสธร</option><option value="ร้อยเอ็ด">ร้อยเอ็ด</option><option value="ระนอง">ระนอง</option><option value="ระยอง">ระยอง</option><option value="ราชบุรี">ราชบุรี</option><option value="ลพบุรี">ลพบุรี</option><option value="ลำปาง">ลำปาง</option><option value="ลำพูน">ลำพูน</option><option value="เลย">เลย</option><option value="ศรีสะเกษ">ศรีสะเกษ</option><option value="สกลนคร">สกลนคร</option><option value="สงขลา">สงขลา</option><option value="สตูล">สตูล</option><option value="สมุทรปราการ">สมุทรปราการ</option><option value="สมุทรสงคราม">สมุทรสงคราม</option><option value="สมุทรสาคร">สมุทรสาคร</option><option value="สระแก้ว">สระแก้ว</option><option value="สระบุรี">สระบุรี</option><option value="สิงห์บุรี">สิงห์บุรี</option><option value="สุโขทัย">สุโขทัย</option><option value="สุพรรณบุรี">สุพรรณบุรี</option><option value="สุราษฎร์ธานี">สุราษฎร์ธานี</option><option value="สุรินทร์">สุรินทร์</option><option value="หนองคาย">หนองคาย</option><option value="หนองบัวลำภู">หนองบัวลำภู</option><option value="อ่างทอง">อ่างทอง</option><option value="อำนาจเจริญ">อำนาจเจริญ</option><option value="อุดรธานี">อุดรธานี</option><option value="อุตรดิตถ์">อุตรดิตถ์</option><option value="อุทัยธานี">อุทัยธานี</option><option value="อุบลราชธานี">อุบลราชธานี</option>
            </select>
        </div>
        <button id="analyzeBtn" class="btn">วิเคราะห์ดวงชะตา</button>
    </div>

    <div id="loadingScreen" class="loading hidden">ANALYZING STARS...</div>
    <div id="profileContent" class="content hidden"></div>
</div>

<div class="actions hidden" id="actionContainer">
    <button id="askAiBtn" class="btn">ลองถาม AI ครั้งแรก</button>
    <div id="askAiResult" class="chat-result hidden"></div>
    <button id="waitlistBtn" class="btn hidden" onclick="window.location.href='#'">เข้าร่วม Waitlist</button>
</div>

<script>
    const API_URL = 'https://muniel-alpha.vercel.app/api/ask';

    document.getElementById('analyzeBtn').addEventListener('click', () => {
        generateProfile();
    });

    const generateProfile = async () => {
        const dob = document.getElementById('dob').value;
        const tob = document.getElementById('tob').value;
        const province = document.getElementById('province').value;

        if (!dob || !tob || !province) {
            alert('กรุณากรอกข้อมูลให้ครบถ้วนก่อนทำการวิเคราะห์');
            return;
        }

        const userData = `Date of Birth: ${dob}, Time: ${tob}, Province: ${province}`;
        
        // Hide form, show loading
        document.getElementById('inputForm').classList.add('hidden');
        document.getElementById('loadingScreen').classList.remove('hidden');
        const prompt = `Based on Western astrology for the following user details (${userData}), generate a short RPG Character Status profile. 
        Format as plain text with clear headings:
        [CLASS] (based on zodiac/traits)
        [ELEMENT]
        [STRENGTHS]
        [WEAKNESSES]
        [PERSONALITY]
        Keep it concise, similar to MBTI, but astrological. Write in Thai language. Use an RPG game tone.`;

        try {
            const resp = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: prompt })
            });
            const data = await resp.json();
            
            document.getElementById('loadingScreen').classList.add('hidden');
            const profileContent = document.getElementById('profileContent');
            
            if (data.error) {
                profileContent.textContent = "SYSTEM ERROR: " + data.error;
            } else {
                profileContent.textContent = data.answer;
                document.getElementById('actionContainer').classList.remove('hidden');
            }
            profileContent.classList.remove('hidden');

        } catch (e) {
            document.getElementById('loadingScreen').classList.add('hidden');
            const profileContent = document.getElementById('profileContent');
            profileContent.textContent = "CONNECTION FAILED. THE STARS ARE UNREACHABLE.";
            profileContent.classList.remove('hidden');
            console.error(e);
        }
    };

    // Ask AI Button logic
    document.getElementById('askAiBtn').addEventListener('click', async () => {
        const question = prompt("ถามคำถามเกี่ยวกับดวงชะตาหรือคำแนะนำส่วนตัวของคุณ (ตัวอย่าง: วันนี้ฉันควรโฟกัสเรื่องอะไร?)");
        if (!question) return;
        
        const btn = document.getElementById('askAiBtn');
        const resultDiv = document.getElementById('askAiResult');
        const waitlistBtn = document.getElementById('waitlistBtn');

        btn.disabled = true;
        btn.textContent = 'SYSTEM PROCESSING...';
        
        try {
            const context = document.getElementById('profileContent').textContent;
            // Provide some context so AI knows it's the same user
            const aiPrompt = `นี่คือโปรไฟล์โหราศาสตร์ของฉัน:\n${context}\n\nคำถามของฉันคือ: ${question}\nช่วยตอบคำถามนี้แบบสั้นกระชับ เป็นภาษาไทย และรักษาโทนความเป็นผู้ให้คำปรึกษาทางโหราศาสตร์ไว้`;

            const resp = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: aiPrompt })
            });
            const data = await resp.json();

            if (data.error) {
                alert('ERROR: ' + data.error);
            } else {
                resultDiv.textContent = `คำตอบ: ${data.answer}`;
                resultDiv.classList.remove('hidden');
                // Show waitlist button
                waitlistBtn.classList.remove('hidden');
            }
        } catch (e) {
            alert('CONNECTION FAILED.');
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.textContent = 'ลองถาม AI อีกครั้ง';
        }
    });

    // Start profile generation on load is removed since we wait for button click
</script>
</body>
</html>
