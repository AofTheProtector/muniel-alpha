<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Muniel — ค้นพบตัวละครในดวงชะตาของคุณ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="วิเคราะห์ตัวตนในสไตล์ RPG — ค้นพบ Class, Element, Strengths และ Weaknesses ของคุณตามหลัก Life Path Number (Numerology)">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --white: #f0f0f0;
            --gray: #888;
            --gold: #ffd700;
            --border: 3px solid #f0f0f0;
        }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Press Start 2P', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* ─── STARFIELD CANVAS ─── */
        #starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── MAIN WRAPPER ─── */
        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 540px;
            padding: 30px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* ─── HERO ─── */
        .hero {
            text-align: center;
            padding-top: 30px;
        }

        .hero .logo {
            font-size: 2.4em;
            letter-spacing: 4px;
            color: var(--white);
            text-shadow: 4px 4px 0 #444;
            animation: floatUpDown 3s ease-in-out infinite;
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .hero .tagline {
            margin-top: 16px;
            font-size: 0.5em;
            color: var(--gray);
            line-height: 2;
        }

        /* ─── PIXEL DIVIDER ─── */
        .pixel-divider {
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(
                to right,
                var(--white) 0px, var(--white) 8px,
                transparent 8px, transparent 16px
            );
            opacity: 0.3;
        }

        /* ─── RPG BOX ─── */
        .rpg-box {
            width: 100%;
            border: var(--border);
            background: #000;
            padding: 24px 20px;
            box-shadow: 6px 6px 0 #333;
            position: relative;
        }

        .rpg-box-title {
            font-size: 0.6em;
            letter-spacing: 2px;
            color: var(--gray);
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px dashed #333;
            padding-bottom: 12px;
        }

        /* ─── FORM ─── */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.5em;
            color: var(--gray);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .rpg-input {
            width: 100%;
            background: #111;
            color: var(--white);
            border: 2px solid #444;
            padding: 12px 10px;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55em;
            outline: none;
            transition: border-color 0.15s;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .rpg-input:focus, .rpg-input:hover {
            border-color: var(--white);
        }

        input[type="date"].rpg-input {
            color-scheme: dark;
        }

        /* ─── CURSOR BLINK ON INPUTS ─── */
        .rpg-input:focus {
            caret-color: var(--white);
            animation: inputGlow 1.5s ease-in-out infinite alternate;
        }
        @keyframes inputGlow {
            from { border-color: #666; }
            to   { border-color: var(--white); }
        }

        /* ─── SUBMIT BUTTON ─── */
        .btn-analyze {
            width: 100%;
            padding: 16px;
            background: var(--white);
            color: #000;
            border: none;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.65em;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 4px 4px 0 #555;
            transition: all 0.1s;
            position: relative;
            overflow: hidden;
        }

        .btn-analyze:hover {
            background: var(--gold);
            box-shadow: 4px 4px 0 #999;
        }

        .btn-analyze:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .btn-analyze::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-20deg);
            animation: shimmer 2.5s infinite;
        }
        @keyframes shimmer {
            0% { left: -100%; }
            60%, 100% { left: 140%; }
        }

        /* ─── FOOTER NOTE ─── */
        .footer-note {
            font-size: 0.38em;
            color: #444;
            text-align: center;
            line-height: 2.2;
        }

        /* ─── PIXEL SPRITE DECORATION ─── */
        .pixel-sprite {
            width: 80px;
            height: 80px;
            image-rendering: pixelated;
        }

        /* ─── VALIDATION ERROR ─── */
        .error-msg {
            font-size: 0.42em;
            color: #ff4444;
            margin-top: 6px;
            display: none;
        }
        .rpg-input.invalid {
            border-color: #ff4444 !important;
        }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="wrapper">

    <!-- HERO -->
    <div class="hero">
        <div class="logo">✦ MUNIEL ✦</div>
        <p class="tagline">
            NUMEROLOGY ENGINE<br>
            ── LIFE PATH RPG EDITION ──
        </p>
    </div>

    <!-- PIXEL SPRITE -->
    <svg class="pixel-sprite" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <!-- Wizard pixel art -->
        <rect x="6" y="0" width="4" height="2" fill="#fff"/>
        <rect x="5" y="1" width="6" height="1" fill="#fff"/>
        <rect x="4" y="2" width="8" height="1" fill="#fff"/>
        <rect x="6" y="3" width="4" height="3" fill="#fff"/>
        <rect x="5" y="5" width="6" height="1" fill="#888"/>
        <rect x="4" y="6" width="8" height="4" fill="#fff"/>
        <rect x="3" y="6" width="2" height="3" fill="#fff"/>
        <rect x="11" y="6" width="2" height="3" fill="#fff"/>
        <rect x="5" y="10" width="2" height="4" fill="#fff"/>
        <rect x="9" y="10" width="2" height="4" fill="#fff"/>
        <!-- Eyes -->
        <rect x="6" y="4" width="1" height="1" fill="#000"/>
        <rect x="9" y="4" width="1" height="1" fill="#000"/>
        <!-- Staff -->
        <rect x="13" y="3" width="1" height="9" fill="#888"/>
        <rect x="13" y="2" width="1" height="2" fill="#ffd700"/>
        <style>
            svg { animation: pixelBob 2s ease-in-out infinite; }
            @keyframes pixelBob {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-6px); }
            }
        </style>
    </svg>

    <div class="pixel-divider"></div>

    <!-- FORM BOX -->
    <div class="rpg-box">
        <div class="rpg-box-title">▸ ENTER YOUR BIRTH DATA ◂</div>

        <div class="form-group">
            <label for="dob">วันเกิด / DATE OF BIRTH</label>
            <input type="date" id="dob" class="rpg-input">
            <div class="error-msg" id="err-dob">⚠ กรุณาเลือกวันเกิด</div>
        </div>



        <button class="btn-analyze" id="analyzeBtn">▶ วิเคราะห์เส้นทางชีวิต</button>
    </div>

    <div class="pixel-divider"></div>

    <div class="footer-note">
        POWERED BY NUMEROLOGY · LIFE PATH ENGINE<br>
        ข้อมูลของคุณจะถูกใช้สำหรับการวิเคราะห์เท่านั้น
    </div>

</div>

<script>
    // ─── STARFIELD ───────────────────────────────────────────
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < 160; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() < 0.15 ? 2 : 1,
                alpha: Math.random(),
                speed: Math.random() * 0.3 + 0.05,
                twinkleSpeed: Math.random() * 0.02 + 0.005,
                twinkleDir: Math.random() > 0.5 ? 1 : -1
            });
        }
    }

    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            s.alpha += s.twinkleSpeed * s.twinkleDir;
            if (s.alpha >= 1 || s.alpha <= 0.1) s.twinkleDir *= -1;
            s.y -= s.speed;
            if (s.y < 0) { s.y = canvas.height; s.x = Math.random() * canvas.width; }
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(240,240,240,${s.alpha})`;
            ctx.fill();
        });
        requestAnimationFrame(drawStars);
    }

    resizeCanvas();
    initStars();
    drawStars();
    window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

    // ─── FORM SUBMIT ─────────────────────────────────────────
    document.getElementById('analyzeBtn').addEventListener('click', () => {
        const dob = document.getElementById('dob').value;
        const err = document.getElementById('err-dob');

        if (!dob) {
            document.getElementById('dob').classList.add('invalid');
            if (err) err.style.display = 'block';
            return;
        } else {
            document.getElementById('dob').classList.remove('invalid');
            if (err) err.style.display = 'none';
        }

        // Save to localStorage and navigate
        localStorage.setItem('muniel_dob', dob);

        const btn = document.getElementById('analyzeBtn');
        btn.textContent = 'LOADING...';
        btn.disabled = true;

        setTimeout(() => { window.location.href = 'profile.html'; }, 300);
    });
</script>
</body>
</html>
